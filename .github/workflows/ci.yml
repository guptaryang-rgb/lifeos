name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install --no-save playwright

      - name: Syntax check all JS
        run: |
          for f in js/*.js; do
            node --check "$f"
          done

      - name: Serve app
        run: |
          python3 -m http.server 8765 &
          sleep 2

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          cat > /tmp/smoke.cjs << 'JSEOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
            const errors = [];
            page.on('pageerror', e => errors.push(e.message));
            page.on('console', m => { if (m.type() === 'error') errors.push(m.text()); });

            const routes = ['dashboard','calendar','planner','tasks','goals','habits','focus','study','food','finance','wellness','screentime','analytics','timeline','integrations','security'];
            for (const r of routes) {
              await page.goto('http://localhost:8765/#' + r, { waitUntil: 'networkidle' });
              await page.waitForTimeout(400);
              const txt = await page.locator('.page').first().innerText();
              if (!txt || txt.length < 20) throw new Error('Empty page: ' + r);
            }

            if (errors.length) throw new Error('Errors: ' + errors.join('\\n'));
            await browser.close();
            console.log('OK — all ' + routes.length + ' routes render cleanly');
          })();
          JSEOF
          node /tmp/smoke.cjs
