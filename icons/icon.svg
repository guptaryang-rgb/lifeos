<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#5a4bd1"/>
    </linearGradient>

    <!-- Lightning bolt gold gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#f0c030"/>
    </linearGradient>

    <!-- Soft inner glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Subtle drop shadow for the bolt -->
    <filter id="boltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a1040" flood-opacity="0.45"/>
    </filter>

    <!-- Rounded-rect clip for maskable safe zone -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Subtle radial highlight for depth -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#glow)"/>

  <!-- Decorative circle ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2.5"/>

  <!-- Lightning bolt ⚡ — stylised, centered -->
  <g filter="url(#boltShadow)">
    <polygon
      points="
        280,72
        180,240
        240,240
        200,440
        340,248
        272,248
        320,72
      "
      fill="url(#boltGrad)"
      stroke="rgba(255,255,255,0.5)"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>

  <!-- Tiny "OS" text at the bottom for brand reinforcement -->
  <text x="256" y="486" text-anchor="middle"
        font-family="'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-weight="700" font-size="32" letter-spacing="6"
        fill="rgba(255,255,255,0.35)">
    LIFEOS
  </text>
</svg>
